apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-raz1
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-3"  # Deploys first
spec:
  project: msp
  source:
    repoURL: https://github.com/NOAA-PMEL/msp-gitops.git
    targetRevision: HEAD
    path: kustomize/apps/redis/overlays/raz1
  destination:
    server: https://kubernetes.default.svc
    # namespace: msp-system
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
