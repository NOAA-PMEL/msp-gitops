apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: filemanager-revpi1
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-1"  # Deploys first
spec:
  project: msp
  source:
    repoURL: https://github.com/NOAA-PMEL/msp-gitops.git
    targetRevision: HEAD
    path: kustomize/apps/filemanager/overlays/revpi1
    # kustomize:
    #   patches:
    #     - patch: |-
    #         - op: replace
    #           path: /spec/subscriber/ref/namespace
    #           value: revpi1
    #       target:
    #         kind: Trigger
  destination:
    server: https://kubernetes.default.svc
    namespace: revpi1-system
    # namespace: revpi1
  syncPolicy:
    automated:
      selfHeal: true
      prune: true