apiVersion: v1
kind: ConfigMap
metadata:
  name: envops
  # namespace: msp
data:
  # Base Environment
  ENVOPS_DAQ_ID: "mspbase01"
  ENVOPS_EXTERNAL_HOSTNAME: "mspbase01.pmel.noaa.gov"
  ENVOPS_PORT: "8080"
  ENVOPS_WS_PORT: "8080"
  ENVOPS_WS_USE_TLS: "false"

  ENVOPS_LOG_LEVEL: debug

  ENVOPS_KNATIVE_BROKER: "http://broker-ingress.knative-eventing.svc.cluster.local/mspbase01-system/default"

  # MQTT Connection & Routing
  ENVOPS_MQTT_BROKER: "mqtt.mspbase01-system"
  ENVOPS_MQTT_PORT: "1883"
  ENVOPS_MQTT_TOPIC_SUBSCRIPTIONS: >
    envds/+/+/+/data/update,
    envds/+/+/+/controller/data/update,
    envds/+/controller/settings/update,
    envds/+/+/+/settings/update,
    envds/+/variableset/+/data/update,
    envds/+/sampling-conditions/status/update,
    envds/+/sampling-states/status/update,
    envds/+/sampling-modes/status/update,
    envds/+/system-modes/status/update
    