apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: envops
namespace: mspbase01-system

resources:
- ../../base
- envops-mw-upgrade.yaml
- envops-configmap.yaml

patches:
  - target: 
      kind: IngressRoute
      name: envops
    patch: |-
      - op: add
        path: /spec/routes/0/middlewares/-
        value:
          name: dashboardtest-upgrade
