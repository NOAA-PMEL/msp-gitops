apiVersion: v1
kind: ConfigMap
metadata:
  name: envops
  # namespace: msp
data:
  # Base Environment
  ENVOPS_DAQ_ID: "revpi1"
  # ENVOPS_EXTERNAL_HOSTNAME: "k8s.revpi1.oarcloud.noaa.gov"
  ENVOPS_EXTERNAL_HOSTNAME: "10.55.159.228"
  ENVOPS_PORT: "8080"
  # ENVOPS_WS_PORT: "8080"
  # ENVOPS_HTTP_USE_TLS: "true"
  # ENVOPS_WS_USE_TLS: "true"

  ENVOPS_LOG_LEVEL: debug

  ENVOPS_KNATIVE_BROKER: "http://broker-ingress.knative-eventing.svc.cluster.local/revpi1-system/default"
  # ENVOPS_KNATIVE_BROKER: http://kafka-broker-ingress.knative-eventing.svc.cluster.local/revpi1-system/default

  # MQTT Connection & Routing
  ENVOPS_MQTT_BROKER: "mqtt.revpi1-system"
  ENVOPS_MQTT_PORT: "1883"
  ENVOPS_MQTT_TOPIC_SUBSCRIPTIONS: >
    envds/+/+/+/data/update,
    envds/+/+/+/controller/data/update,
    envds/+/controller/settings/update,
    envds/+/+/+/settings/update,
    envds/+/variableset/+/data/update,
    envds/+/sampling-conditions/status/update,
    envds/+/sampling-states/status/update,
    envds/+/sampling-modes/status/update,
    envds/+/system-modes/status/update
    