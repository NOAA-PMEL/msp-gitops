apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt
  labels:
    app: mqtt
spec:
  selector:
    matchLabels:
      app: mqtt
  template:
    metadata:
      labels:
        app: mqtt
    spec:
      containers:
      # --- 1. Your Existing Mosquitto Container ---
      - name: mqtt
        image: eclipse-mosquitto:2.0.21
        resources:
          requests:
            cpu: "200m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - name: http
          containerPort: 1883
          protocol: TCP
        volumeMounts:
            - name: mqtt-config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
            - name: mosquitto-storage
              mountPath: /mosquitto/data

      # --- 2. The NEW Python Relay Sidecar ---
      - name: mqtt-relay
        image: python:3.10-slim
        # Install the MQTT library and run our script
        command: ["/bin/sh", "-c"]
        args: ["pip install paho-mqtt==1.6.1 && python -u /scripts/relay.py"]
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
        volumeMounts:
          - name: relay-script-vol
            mountPath: /scripts/relay.py
            subPath: relay.py

      volumes:
        - name: mqtt-config
          configMap:
            name: mqtt-config
        - name: mosquitto-storage
          persistentVolumeClaim:
            claimName: mqtt-pvc
        # Mount the script ConfigMap
        - name: relay-script-vol
          configMap:
            name: mqtt-relay-script