apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: registrar

namespace: raz1-system
# Example configuration for the webserver
# at https://github.com/monopole/hello
# commonLabels:
#   app: nginx

# resources:
# # Example configuration for the webserver
# # at https://github.com/monopole/hello
#   nameSuffix: -usc206
#   commonLabels:
#     app: usconverters-uscdr301
#     variant: test

resources:
- ../../base
- registrar-configmap.yaml
- registrar-triggers.yaml
# - datastore-sealedsecrets.yaml

patches:
  # change configmap names to account for s/n suffix
  - target:
      # version: serving.knative.dev/v1
      kind: Service
      name: registrar
    patch: |-
      - op: add 
        path: /spec/template/metadata/annotations/autoscaling.knative.dev~1min-scale
        value: "1"
  - target: 
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: REGISTRAR_ALLOWED_SYNC_SOURCES
          valueFrom:
            configMapKeyRef:
              name: registrar
              key: allowed_sync_sources
