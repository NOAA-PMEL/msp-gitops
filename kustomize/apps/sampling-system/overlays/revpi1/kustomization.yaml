apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: sampling-system

# set namespace
namespace: revpi1-system

resources:
- ../../base
- sampling-system-configmap.yaml

configMapGenerator:
  - name: sampling-system-platforms
    files:
      - platform_defs.json
  - name: sampling-system-variablemaps
    files:
      - platform_variablemaps.json=platform_varmaps.json
  - name: sampling-system-deployments
    files:
      - deployments.json

nameSuffix: "-revpi1"