apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: sampling-system

namespace: revpi1-system

resources:
- ../../base
- sampling-system-configmap.yaml

configMapGenerator:
  # PULL PLATFORMS FROM SHARED LIBRARY
  - name: sampling-system-platforms
    files:
      - ../shared_configs/templates/platforms/msp_payload_def.json
  
  - name: sampling-system-deployments
    files:
      - ../shared_configs/templates/deployments/internal_edge_deployment.json

  - name: sampling-system-variablemaps
    files:
      - ../shared_configs/templates/varmaps/ntp_nav_varmap.json
      - ../shared_configs/templates/varmaps/magic250_varmap.json
      - ../shared_configs/templates/varmaps/aps3321_varmap.json
      - ../shared_configs/templates/varmaps/spider810_varmap.json 

nameSuffix: "-revpi1"