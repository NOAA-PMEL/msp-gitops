apiVersion: v1
kind: ConfigMap
metadata:
  name: sampling-system
data:
  daq_id: revpi1
  node_id: "revpi1"
  node_roles: "local-controller" 

  # --- 1. GITOPS IDENTITY ---
  SAMPLING_NAMESPACE: "pmel.noaa.gov"
  ENVOPS_PLATFORM_REF: "platform.pmel.payload_alvan_01"
  ENVOPS_PLATFORM_DISPLAY_NAME: "Payload ALVAN 01"
  ENVOPS_HOST_PLATFORM_REF: "platform.pmel.acg_alvan"
  ENVOPS_DEPLOYMENT_REF: "deploy.pmel.payload_alvan_01_in_acg_alvan"
  ENVOPS_DEPLOYMENT_DISPLAY_NAME: "Payload ALVAN 01 in ACG ALVAN"
  ENVOPS_SAMPLE_LINE: "sample-line-01"
  DEPLOYMENT_START_TIME: "2026-05-01T00:00:00Z"
  DEPLOYMENT_END_TIME: "2027-12-31T23:59:59Z"

  # --- 2. SCHEMA TUNING (Data Table Timebases) ---
  MAIN_VARSET_TIMEBASE: "1"
  SIZING_VARSET_TIMEBASE: "60"
  POWER_VARSET_TIMEBASE: "1"

  # --- 3. REVISION TIMES ---
  DEPLOYMENT_REVISION_TIME: "2026-06-25T14:00:00Z"
  PLATFORM_REVISION_TIME: "2026-06-25T14:00:00Z"
  CPC_REVISION_TIME: "2026-06-25T14:00:00Z"
  APS_REVISION_TIME: "2026-06-25T14:00:00Z"
  SMPS_REVISION_TIME: "2026-06-25T14:00:00Z"
  NAV_REVISION_TIME: "2026-06-25T14:00:00Z"
  POWER_REVISION_TIME: "2026-06-25T14:00:00Z"

  # --- 4. SENSOR-AGNOSTIC HARDWARE WIRING ---
  # Primary CPC
  CPC_DRIVER: "AerosolDynamics::MAGIC250"
  CPC_SN: "181"
  CPC_CONC_VAR: "concentration"
  CPC_FLOW_VAR: "flow"
  
  # Primary APS
  APS_DRIVER: "TSI::APS3321"
  APS_SN: "273"
  APS_DIA_VAR: "diameter"
  APS_COUNTS_VAR: "particle_counts"
  APS_DN_VAR: "dN"
  APS_DNDLOGDP_VAR: "dNdlogDp"
  APS_INTN_VAR: "intN"
  APS_TFLOW_VAR: "tflow"
  APS_SFLOW_VAR: "sflow"
  APS_TEMP_VAR: "itemp"

  # Primary SMPS
  SMPS_DRIVER: "AerosolDynamics::Spider-MAGIC810"
  SMPS_SN: "017"
  SMPS_DIA_VAR: "diameter"
  SMPS_DN_VAR: "dN"
  SMPS_DNDLOGDP_VAR: "dNdlogDp"
  SMPS_INTN_VAR: "intN"
  SMPS_FLOW_VAR: "flow"
  SMPS_TEMP_VAR: "input_T"
  SMPS_PRES_VAR: "abs_pressure"

  # Primary Nav (NTP Server)
  NAV_DRIVER: "PhoenixContact::NTP"
  NAV_SN: "63d"
  NAV_LAT_VAR: "lat"
  NAV_LON_VAR: "lon"
  # (NTP doesn't supply heading/speed, so these will safely map to None/null in the template)
  NAV_HEAD_VAR: "heading" 
  NAV_SPEED_VAR: "speed"
  NAV_YAW_VAR: "yaw"
  NAV_PITCH_VAR: "pitch"
  NAV_ROLL_VAR: "roll"
  NAV_HEAVE_VAR: "heave"

  # Power Relays
  POWER_PRO3_DRIVER: "Shelly::ShellyPro3"
  POWER_PRO3_SN: "shel28"
  POWER_PRO1_DRIVER: "Shelly::ShellyPro1"
  POWER_PRO1_SN: "shel29"

  # --- 5. DAQ CONFIGS ---
  port: "8080"
  knative_broker: "http://broker-ingress.knative-eventing.svc.cluster.local/revpi1-system/default"
  mqtt_broker: "mqtt.revpi1-system"
  mqtt_topic_subscriptions: >
    envds/+/+/+/data/update,   
    envds/+/+/+/controller/data/update,
    envds/+/+/+/settings/update,
    envds/+/controller/settings/update   
  mqtt_port: "1883"
  log_level: "INFO"
  tick_delay_direct: "0.3"
  tick_delay_calc: "1.0"