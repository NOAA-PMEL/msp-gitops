apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: sampling-system

namespace: raz1-system

resources:
  - ../../base
  - sampling-system-configmap.yaml

configMapGenerator:
  - name: sampling-system-platforms
    files:
      - ../../shared_configs/templates/platforms/msp_payload_def.json
  - name: sampling-system-deployments
    files:
      - ../../shared_configs/templates/deployments/internal_edge_deployment.json
  - name: sampling-system-variablemaps
    files:
      - ../../shared_configs/templates/varmaps/primary_met_varmap.json
      - ../../shared_configs/templates/varmaps/primary_gas_varmap.json
      - ../../shared_configs/templates/varmaps/primary_nav_varmap.json
      - ../../shared_configs/templates/varmaps/inlet_flow_varmap.json
      - ../../shared_configs/templates/varmaps/derived_wind_varmap.json

nameSuffix: "-raz1"

patches:
  - target:
      kind: Service
      name: sampling-system
    patch: |-
      - op: replace 
        path: /spec/template/spec/volumes/0/configMap/name
        value: sampling-system-platforms-raz1
      - op: replace 
        path: /spec/template/spec/volumes/1/configMap/name
        value: sampling-system-variablemaps-raz1
      - op: replace 
        path: /spec/template/spec/volumes/2/configMap/name
        value: sampling-system-deployments-raz1

configurations:
  - config.yaml

