apiVersion: v1
kind: ConfigMap
metadata:
  name: sampling-system
data:
  daq_id: raz1
  node_id: "raz1"
  node_roles: "operations-controller"

  # --- 1. GITOPS IDENTITY ---
  SAMPLING_NAMESPACE: "pmel.noaa.gov"
  ENVOPS_DEPLOYMENT_REF: "deploy.pmel.payload_03_in_msp_01"
  ENVOPS_DEPLOYMENT_DISPLAY_NAME: "Payload 03 in Enclosure 01"
  ENVOPS_PLATFORM_REF: "platform.pmel.payload_03"
  ENVOPS_PLATFORM_DISPLAY_NAME: "MSP Payload 03"
  ENVOPS_HOST_PLATFORM_REF: "platform.pmel.msp_enclosure_01"
  ENVOPS_SAMPLE_LINE: "sample-line-01"
  DEPLOYMENT_START_TIME: "2026-06-29T00:00:00Z"
  DEPLOYMENT_END_TIME: "2029-12-31T23:59:59Z"
  
  # --- 2. SCHEMA TUNING (Data Table Timebases) ---
  MAIN_VARSET_TIMEBASE: "1"
  OPERATIONS_VARSET_TIMEBASE: "1"
  DERIVED_VARSET_TIMEBASE: "1"

  # --- 3. REVISION TIMES ---
  DEPLOYMENT_REVISION_TIME: "2026-06-29T00:00:00Z"
  PLATFORM_REVISION_TIME: "2026-06-29T00:00:00Z"
  MET_REVISION_TIME: "2026-06-29T00:00:00Z"
  GAS_REVISION_TIME: "2026-06-29T00:00:00Z"
  NAV_REVISION_TIME: "2026-06-29T00:00:00Z"
  FLOW_REVISION_TIME: "2026-06-29T00:00:00Z"
  DERIVED_WIND_REVISION_TIME: "2026-06-29T00:00:00Z"
  
  # --- 4. SENSOR-AGNOSTIC HARDWARE WIRING ---
  # Primary Met Station
  MET_DRIVER: "Vaisala::WXT536"
  MET_SN: "925"
  MET_WS_VAR: "Sm"
  MET_WD_VAR: "Dm"
  MET_TEMP_VAR: "Ta"
  MET_RH_VAR: "Ua"
  MET_PRES_VAR: "Pa"
  MET_RAIN_VAR: "Ri"
  
  # Primary Gas Analyzer
  GAS_DRIVER: "Vaisala::AQT560"
  GAS_SN: "908"
  GAS_NO2_VAR: "NO2"
  GAS_CO_VAR: "CO"
  GAS_O3_VAR: "O3"
  GAS_NO_VAR: "NO"
  GAS_PM1_VAR: "PM1"
  GAS_PM25_VAR: "PM2_5"
  GAS_PM10_VAR: "PM10"

  # Primary Nav
  NAV_DRIVER: "Furuno::SCX21"
  NAV_SN: "582"
  NAV_LAT_VAR: "lat"
  NAV_LON_VAR: "lon"
  NAV_HEAD_VAR: "heading"
  NAV_SPEED_VAR: "speed"
  NAV_YAW_VAR: "yaw"
  NAV_PITCH_VAR: "pitch"
  NAV_ROLL_VAR: "roll"
  NAV_HEAVE_VAR: "heave"

  # Inlet Flow Controller
  FLOW_DRIVER: "SanyoDenki::SanAce92RF"
  FLOW_SN: "inletflow"
  FLOW_SPEED_VAR: "fan_speed"
  FLOW_SP_VAR: "fan_speed_sp"

  # --- 5. DAQ CONFIGS ---
  port: "8080"
  knative_broker: "http://broker-ingress.knative-eventing.svc.cluster.local/raz1-system/default"
  mqtt_broker: "mqtt.raz1-system"
  mqtt_topic_subscriptions: >
    envds/+/+/+/data/update,   
    envds/+/+/+/controller/data/update,
    envds/+/+/+/settings/update,
    envds/+/controller/settings/update,
    envds/+/variableset/+/data/update
  mqtt_port: "1883"
  log_level: "INFO"
  tick_delay_direct: "0.8"
  tick_delay_calc: "1.5"

