apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: sampling-system

# Optional: Set a common namespace or labels for the pmel-dev deployment
namespace: pmel-dev-system

# Point this to wherever your base sampling-system Knative service lives
resources:
  - ../../base
  - sampling-system-configmap.yaml

nameSuffix: -pmel-dev

# 1. GENERATE THE CONFIGMAPS FROM YOUR JSON FILES
configMapGenerator:
  - name: sampling-system-platforms
    files: 
      - platform_defs.json
  - name: sampling-system-deployments
    files: 
      - deployments.json
  - name: sampling-system-projects
    files: 
      - projects.json
  - name: sampling-system-contacts
    files: 
      - contacts.json
  - name: sampling-system-variablemaps
    files: 
      - platform_varmaps.json

# 2. INJECT THEM INTO THE KNATIVE SERVICE VOLUMES
patches:
  - target:
      kind: Service
      name: sampling-system
    patch: |-
      # Mount Platforms
      - op: replace 
        path: /spec/template/spec/volumes/0/configMap/name
        value: sampling-system-platforms-pmel-dev
      
      # Mount Variablemaps
      - op: replace 
        path: /spec/template/spec/volumes/1/configMap/name
        value: sampling-system-variablemaps-pmel-dev

      # Mount Deployments (This is the new one!)
      - op: replace 
        path: /spec/template/spec/volumes/2/configMap/name
        value: sampling-system-deployments-pmel-dev
      
      # Mount Projects
      - op: replace 
        path: /spec/template/spec/volumes/3/configMap/name
        value: sampling-system-projects-pmel-dev
      
      # Mount Contacts
      - op: replace 
        path: /spec/template/spec/volumes/4/configMap/name
        value: sampling-system-contacts-pmel-dev
  - target:
      kind: Trigger
      # name: default
    patch: |-
      - op: replace 
        path: /spec/broker
        value: kafka-broker
      - op: replace 
        path: /spec/subscriber/ref/name
        value: sampling-system-pmel-dev
        

configurations:
  - config.yaml




