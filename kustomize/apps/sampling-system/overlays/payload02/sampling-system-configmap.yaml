apiVersion: v1
kind: ConfigMap
metadata:
  name: sampling-system
data:
  daq_id: payload02
  node_id: "payload02"
  node_roles: "local-controller"

  # --- 1. GITOPS IDENTITY ---
  SAMPLING_NAMESPACE: "pmel.noaa.gov"
  ENVOPS_DEPLOYMENT_REF: "deploy.pmel.payload_02_in_msp_01"
  ENVOPS_DEPLOYMENT_DISPLAY_NAME: "Payload 02 in Enclosure 01"
  ENVOPS_PLATFORM_REF: "platform.pmel.payload_02"
  ENVOPS_PLATFORM_DISPLAY_NAME: "MSP Payload 02"
  ENVOPS_HOST_PLATFORM_REF: "platform.pmel.msp_enclosure_01"
  ENVOPS_SAMPLE_LINE: "sample-line-02"
  DEPLOYMENT_START_TIME: "2026-05-01T00:00:00Z"
  DEPLOYMENT_END_TIME: "2027-12-31T23:59:59Z"
  
  # --- 2. SCHEMA TUNING (Data Table Timebases) ---
  MAIN_VARSET_TIMEBASE: "1"
  POWER_VARSET_TIMEBASE: "1"

  # --- 3. REVISION TIMES ---
  DEPLOYMENT_REVISION_TIME: "2026-05-31T00:00:00Z"
  PLATFORM_REVISION_TIME: "2026-05-24T00:00:00Z"
  NEPH_REVISION_TIME: "2026-06-10T20:27:00Z"
  ABS_REVISION_TIME: "2026-06-10T20:27:00Z"
  POWER_REVISION_TIME: "2026-06-10T20:27:00Z"

  # --- 4. SENSOR-AGNOSTIC HARDWARE WIRING ---
  # Primary Nephelometer
  NEPH_DRIVER: "ACOEM::Aurora3000"
  NEPH_SN: "493"
  NEPH_SCAT_R_VAR: "scat_coef_ch1_red"
  NEPH_SCAT_G_VAR: "scat_coef_ch2_green"
  NEPH_SCAT_B_VAR: "scat_coef_ch3_blue"
  NEPH_BSCAT_R_VAR: "backscatter_coef_ch1_red"
  NEPH_BSCAT_G_VAR: "backscatter_coef_ch2_green"
  NEPH_BSCAT_B_VAR: "backscatter_coef_ch3_blue"
  NEPH_TEMP_VAR: "sample_T"
  NEPH_RH_VAR: "rh"
  NEPH_PRES_VAR: "pressure"
  
  # Primary Absorption Photometer
  ABS_DRIVER: "Brechtel::TAP2901"
  ABS_SN: "052"
  ABS_R_VAR: "red_absorption"
  ABS_G_VAR: "green_absorption"
  ABS_B_VAR: "blue_absorption"
  ABS_TRANS_R_VAR: "red_transmission"
  ABS_TRANS_G_VAR: "green_transmission"
  ABS_TRANS_B_VAR: "blue_transmission"
  ABS_TEMP_VAR: "sample_T"
  ABS_FLOW_VAR: "flow_rate"
  ABS_SPOT_VAR: "active_spot"

  # Power Relays
  POWER_DRIVER: "Synaccess::NP05B"
  POWER_SN: "synaccess25"

  # --- 5. DAQ CONFIGS ---
  port: "8080"
  knative_broker: "http://broker-ingress.knative-eventing.svc.cluster.local/payload02-system/default"
  mqtt_broker: "mqtt.payload02-system"
  mqtt_topic_subscriptions: >
    envds/+/+/+/data/update,   
    envds/+/+/+/controller/data/update,
    envds/+/+/+/settings/update,
    envds/+/controller/settings/update   
  mqtt_port: "1883"
  log_level: "INFO"
  tick_delay_direct: "0.3"
  tick_delay_calc: "1.0"

