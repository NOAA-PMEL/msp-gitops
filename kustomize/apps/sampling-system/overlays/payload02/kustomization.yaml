apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: sampling-system

namespace: payload02-system

resources:
  - ../../base
  - sampling-system-configmap.yaml

configMapGenerator:
  - name: sampling-system-platforms
    files:
      - ../../shared_configs/templates/platforms/msp_payload_def.json
  - name: sampling-system-deployments
    files:
      - ../../shared_configs/templates/deployments/internal_edge_deployment.json
  - name: sampling-system-variablemaps
    files:
      - ../../shared_configs/templates/varmaps/primary_neph_varmap.json
      - ../../shared_configs/templates/varmaps/primary_abs_varmap.json
      - ../../shared_configs/templates/varmaps/payload02_power_varmap.json

