apiVersion: eventing.knative.dev/v1
kind: Trigger
metadata:
  name: datastore-device-definition-registry-ack
  # namespace: msp-system
spec:
  broker: default
  filters:
    - any:
        - exact:
            type: envds.device-definition.registry.ack
        - exact:
            type: envds.controller-definition.registry.ack
    - exact:
        source: envds.mspbase01.datastore
  # filter:
  #   attributes:
  #     type: envds.device-definition.registry.ack
  subscriber:
    ref:
      apiVersion: serving.knative.dev/v1
      # apiVersion: v1
      kind: Service
      name: kn-mqtt-adapter
      # namespace: msp-system
    uri: /mqtt/send/
