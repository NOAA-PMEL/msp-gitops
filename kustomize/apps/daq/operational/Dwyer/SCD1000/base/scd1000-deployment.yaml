apiVersion: apps/v1
kind: Deployment
metadata:
  name: dwyer-scd1000
  labels:
    app: dwyer-scd1000
spec:
  selector:
    matchLabels:
      app: dwyer-scd1000
  template:
    metadata:
      labels:
        app: dwyer-scd1000
    spec:
      imagePullSecrets:
      - name: ghcr-ro-secret
      containers:
      - name: dwyer-scd1000
        image: ghcr.io/noaa-pmel/msp/dwyer-scd1000:0.3.0
        imagePullPolicy: "Always"
        env:
          - name: ENVDS_CORE_NAMESPACE_PREFIX
            valueFrom:
              configMapKeyRef:
                name: dwyer-scd1000-config
                key: namespace_prefix
          - name: ENVDS_ENV_ID
            valueFrom:
              configMapKeyRef:
                name: dwyer-scd1000-config
                key: envds_env_id
          - name: REDIS_OM_URL
            value: redis://redis.default
          - name: LOG_LEVEL
            value: DEBUG
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - name: http
          containerPort: 9080
          protocol: TCP
        volumeMounts:
            - name: dwyer-scd1000-config
              mountPath: /app/config/operational.conf
              subPath: operational.conf
            - name: operational-definition
              mountPath: /app/Dwyer_SCD_operational_definition.json
              subPath: Dwyer_SCD_operational_definition.json
      volumes:
        - name: dwyer-scd1000-config
          configMap:
            name: dwyer-scd1000-config
        - name: operational-definition
          configMap:
            name: operational-definition