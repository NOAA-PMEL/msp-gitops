apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: dwyer-scd1000

namespace: mspbase02-hardware

resources:
- ../../base
- scd1000-configmap.yaml

nameSuffix: "-mspbase02"

patches:
  # change configmap names to account for s/n suffix
  - target:
      kind: Deployment
      name: dwyer-scd1000
    patch: |-
      - op: replace 
        path: /spec/template/spec/volumes/0/configMap/name
        value: dwyer-scd1000-config-mspbase02
      - op: replace 
        path: /spec/template/spec/volumes/1/configMap/name
        value: operational-definition-mspbase02