apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: dwyer-scd1000

namespace: revpi2-hardware

resources:
- ../../base

nameSuffix: "-revpi2"

# Generate the ConfigMap dynamically so it gets a hash suffix
configMapGenerator:
  - name: dwyer-scd1000-config
    literals:
      - namespace_prefix=revpi2
      - envds_env_id=revpi2
    files:
      - operational.conf


