apiVersion: v1
kind: ConfigMap
metadata:
  name: dwyer-scd1000-config
  labels:
    app: dwyer-scd1000
data:
  namespace_prefix: main
  envds_env_id: main
  operational.conf: |
    serial_number: "main"
    daq_id: mspbase02
    modbus_address: 1
    interfaces:
      default: # to read PV and write SV via serial-to-TCP gateway
        interface_env_id: mspbase02-hardware 
        interface_id: USconverters::USCDR301::usc219
        path: port-1 # Update to match your target COM port mapping
    settings:
      set_value: 25.0