apiVersion: v1
kind: ConfigMap
metadata:
  name: ist-fs7-config
  # namespace: msp
  labels:
    app: ist-fs7
    # app-group: envds-sensor-payload03
    app-group: envds-sensor-payload01
data:
  namespace_prefix: payload01
  envds_env_id: payload01
  # namespace_prefix: crk8s
  # envds_env_id: crk8s
  sensor.conf: |
    serial_number: "SN"
    daq_id: payload01
    interfaces:
      default:
        interface_env_id: payload01 # if omitted, defaults to envds_id of sensor
        interface_id: LabJack::Tx::ljtx33
        path: voltage_in-0
    
    calibrations:
      tubing_diameter: 0.5 # inches
      zero_flow_voltage: 0.125 # volts
      zero_flow_temperature: 22.5 # degrees C
      calibration_flows: [0.0, 1.5, 3] # m3/s
      calibration_voltages: [3.6, 5.0, 7.5] # volts
