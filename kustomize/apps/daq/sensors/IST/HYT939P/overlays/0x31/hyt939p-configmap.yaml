apiVersion: v1
kind: ConfigMap
metadata:
  name: ist-hyt939p-config
  # namespace: msp
  labels:
    app: ist-hyt939p
    # app-group: envds-sensor-payload03
    app-group: envds-sensor-raz1
data:
  namespace_prefix: raz1
  envds_env_id: raz1
  # namespace_prefix: crk8s
  # envds_env_id: crk8s
  sensor.conf: |
    serial_number: "0x31"
    daq_id: raz1
    # daq_id: crk8s
    interfaces:
      # default: serial
      default:
        interface_env_id: raz1 # if omitted, defaults to envds_id of sensor
        interface_id: LabJack::Tx::ljtx226
        # interface_id: NetBurner::SB70LC::home38
        # path: port, channel, etc
        path: i2c
    i2c_address: "31"
