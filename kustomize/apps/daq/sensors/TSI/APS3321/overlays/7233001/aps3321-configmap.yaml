apiVersion: v1
kind: ConfigMap
metadata:
  name: tsi-aps3321-config
  # namespace: msp
  labels:
    app: tsi-aps3321
    app-group: envds-sensor-payload01
data:
  namespace_prefix: payload01 
  envds_env_id: payload01
  sensor.conf: |
    serial_number: "7233001"
    daq_id: payload01
    sampling_frequency_sec: 30

    # daq_id: mspbase01
    interfaces:
      default:
        interface_env_id: payload01-hardware # if omitted, defaults to envds_id of sensor
        interface_id: USconverters::USCDR301::usc13
        path: port-1
