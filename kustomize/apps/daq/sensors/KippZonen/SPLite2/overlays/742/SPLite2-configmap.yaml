apiVersion: v1
kind: ConfigMap
metadata:
  name: kippzonen-splite2-config
  # namespace: msp
  labels:
    app: kippzonen-splite2
    app-group: envds-sensor-revpi2
data:
  namespace_prefix: revpi2
  envds_env_id: revpi2
  sensor.conf: |
    serial_number: "742"
    daq_id: revpi2
    interfaces:
      default:
        interface_env_id: revpi2
        interface_id: LabJack::Tx::ljtx226
        path: voltage_in-0

