apiVersion: v1
kind: ConfigMap
metadata:
  name: labjack-tx-config
  # namespace: msp
  labels:
    app: labjack-tx
data:
  namespace_prefix: raz1
  envds_env_id: raz1
  interface.conf: |
    uid: ljtx226
    attributes:
      host: 10.55.169.226
      model: T4
    paths:
      i2c:
        path_type: I2C
        sda_channel: 15
        scl_channel: 14
        speed_throttle: 65516
      counter-18:
        path_type: COUNTER
        channel: 18
        # counter_mode: "interrupt"
        counter_mode: "high-speed"
        sample_mode: "unpolled"
        unpolled_interval_handle: 2
        unpolled_sample_frequency_sec: 1
      pwm-6:
        path_type: PWM
        pwm_channel: 6
        clock_channel: 1
        clock_divisor: 1
        clock_desired_frequency: 25000
        counter_mode: "interrupt"
      voltage_in-0:
        path_type: ADC
        channel: 0                 # Maps to AIN0 on the LabJack
        input_type: single         # Single-ended input from the Tick
        input_voltage_range: 10.0  # Sets the LabJack AIN range to +/- 10V
        gain: 11.0                 # InAmp x11 multiplier
        offset: 1.25               # Standard Tick-InAmp reference voltage
      # voltage_in-4:
      #   path_type: ADC
      #   channel: 4
      #   input_voltage_range: 0.0
      #   input_type: "single"
      # voltage_in-4_5:
      #   path_type: ADC
      #   channel: 4
      #   input_voltage_range: 0.0
      #   input_type: "differential"
      #   diff_ch_negative: 5

