apiVersion: apps/v1
kind: Deployment
metadata:
  name: erddap
  labels:
    app: erddap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erddap
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: erddap
    spec:
      imagePullSecrets:
      - name: ghcr-ro-secret
      containers:
      # 1. Official ERDDAP Backend
      - name: erddap
        # Using the official image (you can pin a specific tag like 2.24-jdk17-openjdk if preferred)
        image: erddap/erddap:latest 
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        # The official image uses these exact same vars to configure Tomcat's heap
        - name: ERDDAP_MIN_MEMORY
          value: "2G"
        - name: ERDDAP_MAX_MEMORY
          value: "4G"
        - name: ERDDAP_baseUrl
          valueFrom:
            configMapKeyRef:
              name: erddap
              key: ERDDAP_BASE_URL
        - name: ERDDAP_baseHttpsUrl
          valueFrom:
            configMapKeyRef:
              name: erddap
              key: ERDDAP_BASE_HTTPS_URL
        - name: ERDDAP_datasetsXmlUrl
          value: "file:///erddapData/datasets.xml"
        resources:
          requests:
            cpu: 250m
            memory: 1.5Gi # Keep k8s request slightly above JVM min
          limits:
            cpu: 1000m
            memory: 2.5Gi # Keep k8s limit slightly above JVM max
        volumeMounts:
        # Mount A: Standard shared directory
        - name: erddap-data
          mountPath: /erddapData
        # Mount B: The direct Tomcat file injection
        - name: erddap-data
          mountPath: /usr/local/tomcat/content/erddap/datasets.xml
          subPath: datasets.xml
          
      # 2. FastAPI Sidecar Proxy & Ingester
      - name: erddap-sidecar
        image: ghcr.io/noaa-pmel/msp/erddap-sidecar:0.1.0 # Replace with your actual image/tag
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: erddap
        env:
        - name: ERDDAP_INSERT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: erddap-secret
              key: insert-password
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        volumeMounts:
        - name: erddap-data
          mountPath: /erddapData
          
      volumes:
      - name: erddap-data
        persistentVolumeClaim:
          claimName: erddap-pvc