apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: erddap-content-storage
  # namespace: msp-system
spec:
  # storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  volumeName: erddap-content-storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: erddap-data-storage
  # namespace: msp-system
spec:
  # storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  volumeName: erddap-data-storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: erddap-datasetsd-storage
  # namespace: msp-system
spec:
  # storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  volumeName: erddap-datasetsd-storage
