apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: erddap-stripprefix
  # namespace: mspbase01-system
  # annotations:
  #   kubernetes.io/ingress.class: traefik
spec:
  stripPrefix:
    prefixes:
      - /msp/erddap-util
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: erddap
  # namespace: mspbase01-system

spec:
  entryPoints:
    - web
  routes:
  - match: PathPrefix(`/msp/erddap-util`)
    kind: Rule
    services:
    - name: erddap
      port: 8000
    middlewares:
    - name: erddap-stripprefix
      # namespace: mspbase01-system