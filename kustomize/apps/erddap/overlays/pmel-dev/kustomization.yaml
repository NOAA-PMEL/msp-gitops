apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: erddap
namespace: pmel-dev-system

resources:
- ../../base
- erddap-secret-sealed.yaml
- erddap-mw-upgrade.yaml
- erddap-configmap.yaml

# Merge in our AWS-specific deployment scaling and storage 
patchesStrategicMerge:
  - storage-patch.yaml
  - resources-patch.yaml

patches:
  - path: storage-patch.yaml
  - target: 
      kind: IngressRoute
      name: erddap
    patch: |-
      - op: add
        path: /spec/routes/0/middlewares/-
        value:
          name: erddap-upgrade