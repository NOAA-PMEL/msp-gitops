apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: erddap
namespace: pmel-dev-system

resources:
- ../../../base/app
- erddap-secret-sealed.yaml
- erddap-mw-upgrade.yaml
# - erddap-configmap.yaml
- erddap-tomcat-configmap.yaml

configMapGenerator:
  - name: erddap
    envs:
      - erddap-config.env

patches:
  - path: resources-patch.yaml
  - target: 
      kind: IngressRoute
      name: erddap
    patch: |-
      - op: add
        path: /spec/routes/0/middlewares/-
        value:
          name: erddap-upgrade