apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: erddap-stripprefix
spec:
  stripPrefix:
    prefixes:
      - /msp/data
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: envds-erddap
spec:
  entryPoints:
    - web
    - websecure # Assuming you have HTTPS enabled on AWS
  routes:
  # Match the AWS domain AND the specific path prefix
  - match: Host(`data.pmel-dev.noaa.gov`) && PathPrefix(`/msp/data`)
    kind: Rule
    services:
    - name: envds-erddap
      port: 80
      passHostHeader: true
    middlewares:
    - name: erddap-stripprefix
    
# ROUTE 2: The Catch-All for ERDDAP's hardcoded assets
  # (No middleware here, because we WANT the sidecar to see the /erddap path)
  - match: PathPrefix(`/erddap`)
    kind: Rule
    services:
    - name: erddap
      port: 80
      passHostHeader: true