apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: sampling-modes

# Set the namespace for the pmel-dev system
namespace: pmel-dev-system

resources:
- ../../base
- sampling-modes-configmap.yaml

# Dynamically generate ConfigMaps from local JSON files
configMapGenerator:
  - name: sampling-modes-modes
    files:
      - sampling_modes_modes.json
  - name: sampling-modes-actions
    files:
      - sampling_modes_actions.json

# Append the system-specific suffix to all resources
nameSuffix: "-pmel-dev"

patches:
  # Patch the Service volume definitions to use the suffixed ConfigMap names
  # - target:
  #     kind: Service
  #     name: sampling-modes
  #   patch: |-
  #     - op: replace 
  #       path: /spec/template/spec/volumes/0/configMap/name
  #       value: sampling-modes-modes-pmel-dev
  #     - op: replace 
  #       path: /spec/template/spec/volumes/1/configMap/name
  #       value: sampling-modes-actions-pmel-dev
  
  # Patch the Knative Triggers to route events to the suffixed Service
  - target:
      kind: Trigger
    patch: |-
      - op: replace 
        path: /spec/subscriber/ref/name
        value: sampling-modes-pmel-dev

# Reference the local Kustomize configuration definition
configurations:
  - config.yaml