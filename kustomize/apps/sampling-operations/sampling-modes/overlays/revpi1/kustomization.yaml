apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: revpi1-system

resources:
- ../../base
- sampling-modes-configmap.yaml

configMapGenerator:
  - name: sampling-modes-modes
    files:
      - ../../shared_configs/templates/modes/pmel_startup_complete_mode.json
      - ../../shared_configs/templates/modes/pmel_nominal_sampling_mode.json
  - name: sampling-modes-actions
    files:
      # ---> Point to the newly scoped action file <---
      - ../../shared_configs/templates/actions/turn_off_cpc_action.json

