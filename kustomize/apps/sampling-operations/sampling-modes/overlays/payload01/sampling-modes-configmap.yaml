apiVersion: v1
kind: ConfigMap
metadata:
  name: sampling-modes
data:
  daq_id: payload01
  DAQ_ID: payload01

  # --- GITOPS IDENTITY INJECTION ---
  SAMPLING_NAMESPACE: "pmel.noaa.gov"
  ENVOPS_DEPLOYMENT_REF: "deploy.pmel.payload_01_in_msp_01"
  ACTIONS_REVISION_TIME: "2026-06-11T19:26:00Z"
  
  # --- SENSOR-AGNOSTIC WIRING ---
  ACTIONS_MODULE: "payload01_actions"
  POWER_VARMAP: "payload_01"
  
  port: "8080"
  knative_broker: "http://broker-ingress.knative-eventing.svc.cluster.local/payload01-system/default"
  is_primary_controller: "true"

  mqtt_broker: "mqtt.payload01-system"
  mqtt_topic_subscriptions: >
    envds/+/+/+/data/#,
    envds/+/sampling-states/#,
    envds/payload01/sampling-modes/#
  mqtt_port: "1883"

