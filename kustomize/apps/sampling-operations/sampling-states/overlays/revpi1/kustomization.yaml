apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: revpi1-system

resources:
- ../../base
- sampling-states-configmap.yaml

configMapGenerator:
  - name: sampling-states-states
    files:
      - ../../shared_configs/templates/states/pmel_nominal_location_state.json
      - ../../shared_configs/templates/states/nominal_concentrations_state.json
      - ../../shared_configs/templates/states/cpc_hardware_ready_state.json
      - ../../shared_configs/templates/states/telemetry_verified_state.json

generatorOptions:
  disableNameSuffixHash: true

nameSuffix: "-revpi1"

patches:
  - target:
      kind: Service
      name: sampling-states
    patch: |-
      - op: replace 
        path: /spec/template/spec/volumes/0/configMap/name
        value: sampling-states-states-revpi1
  - target:
      kind: Trigger
    patch: |-
      - op: replace 
        path: /spec/subscriber/ref/name
        value: sampling-states-revpi1

