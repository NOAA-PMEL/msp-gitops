apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: payload01-system

resources:
  - ../../base

configMapGenerator:
  - name: system-modes
    envs:
      - system-modes.env
  - name: system-modes-modes
    files:
      - ../../shared_configs/templates/system_modes/payload_normal_system_mode.json
      - ../../shared_configs/templates/system_modes/payload01_startup_system_mode.json
      - ../../shared_configs/templates/system_modes/payload01_shutdown_system_mode.json
      - ../../shared_configs/templates/system_modes/beacons_standby_system_mode.json
      - ../../shared_configs/templates/system_modes/beacons_maintenance_system_mode.json

