apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: system-modes

namespace: payload01-system

resources:
- ../../base
- system-modes-configmap.yaml

# Generate the ConfigMap from your provided JSON file
configMapGenerator:
  - name: system-modes-modes
    files:
      - system_modes_modes.json

generatorOptions:
  disableNameSuffixHash: true

# Suffix used across the payload01 deployment
nameSuffix: "-payload01"

configurations:
  - config.yaml