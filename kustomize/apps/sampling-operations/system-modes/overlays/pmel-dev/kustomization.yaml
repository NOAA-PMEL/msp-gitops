apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: pmel-dev-system

resources:
- ../../base
- system-modes-configmap.yaml

# Generate the ConfigMap from your provided JSON file
configMapGenerator:
  - name: system-modes-modes
    files:
      - system_modes_modes.json

generatorOptions:
  disableNameSuffixHash: true

# Suffix used across the pmel-dev deployment
nameSuffix: "-pmel-dev"

patches:
  # Ensure the Service volume (index 0) points to the suffixed ConfigMap
  - target:
      kind: Service
      name: system-modes
    patch: |-
      - op: replace 
        path: /spec/template/spec/volumes/0/configMap/name
        value: system-modes-modes-pmel-dev
  # Ensure the Triggers route traffic to the suffixed Service
  - target:
      kind: Trigger
    patch: |-
      - op: replace 
        path: /spec/subscriber/ref/name
        value: system-modes-pmel-dev

configurations:
  - config.yaml