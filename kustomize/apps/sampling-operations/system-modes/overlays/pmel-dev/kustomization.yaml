apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: pmel-dev-system

resources:
  - ../../base

configMapGenerator:
  - name: system-modes
    envs:
      - system-modes.env
  - name: system-modes-modes
    files:
      - system_modes_modes.json

