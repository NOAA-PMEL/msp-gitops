apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: system-modes

namespace: revpi1-system

resources:
- ../../base
- system-modes-configmap.yaml

# Generate the ConfigMap from your provided JSON file
configMapGenerator:
  - name: system-modes-modes
    files:
      - system_modes_modes.json

generatorOptions:
  disableNameSuffixHash: true

# Suffix used across the revpi1 deployment
nameSuffix: "-revpi1"

configurations:
  - config.yaml

patches:
  - target:
      kind: Deployment
      name: system-modes  # Replace with the actual base name of your deployment
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: system-modes
      spec:
        template:
          spec:
            containers:
              - name: system-modes  # Replace with the actual container name
                env:
                  - name: SYSTEM_MODES_SYSTEM_INIT_MODE
                    value: "normal"