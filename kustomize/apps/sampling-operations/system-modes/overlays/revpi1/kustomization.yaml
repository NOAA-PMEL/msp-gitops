apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: revpi1-system
resources:
- ../../base
- system-modes-configmap.yaml
configMapGenerator:
  - name: system-modes-modes
    files:
      - ../../shared_configs/templates/system_modes/pmel_normal_system_mode.json
generatorOptions:
  disableNameSuffixHash: true
nameSuffix: "-revpi1"
configurations:
  - config.yaml
patches:
  - target: { kind: Service, name: system-modes }
    patch: |-
      - op: replace 
        path: /spec/template/spec/volumes/0/configMap/name
        value: system-modes-modes-revpi1
  - target: { kind: Trigger }
    patch: |-
      - op: replace 
        path: /spec/subscriber/ref/name
        value: system-modes-revpi1


