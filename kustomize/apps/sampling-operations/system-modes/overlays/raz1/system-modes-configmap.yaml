apiVersion: v1
kind: ConfigMap
metadata:
  name: system-modes
  # namespace: msp-system
data:
  daq_id: raz1

  ENVOPS_DEPLOYMENT_REF: "deploy.pmel.payload_03_in_msp_01"
  
  port: "8080"
  knative_broker: "http://broker-ingress.knative-eventing.svc.cluster.local/raz1-system/default"

  system_init_control: "auto"
  system_init_mode: "normal"
  is_primary_controller: "true"

  mqtt_broker: "mqtt.raz1-system"
  mqtt_topic_subscriptions: >
    envds/+/+/+/data/#,
    envds/+/system-modes/#,
    envds/+/sampling-modes/#


  mqtt_port: "1883"
