apiVersion: v1
kind: ConfigMap
metadata:
  name: system-modes
data:
  daq_id: raz1
  port: "8080"
  knative_broker: "http://broker-ingress.knative-eventing.svc.cluster.local/raz1-system/default"

  SAMPLING_NAMESPACE: "pmel.noaa.gov"
  ENVOPS_DEPLOYMENT_REF: "deploy.beacons.payload_03_in_marjorie_c"
  SYSTEM_MODES_REVISION_TIME: "2026-06-11T19:19:00Z"
  deployment_ref: "deploy.beacons.payload_03_in_marjorie_c"

  system_init_control: "auto"
  system_init_mode: "normal"
  is_primary_controller: "true"
  mqtt_broker: "mqtt.raz1-system"
  mqtt_topic_subscriptions: "envds/+/+/+/data/#, envds/+/system-modes/#, envds/+/sampling-modes/#"
  mqtt_port: "1883"

