nameReference:
  # ---------------------------------------------------------------------
  # Rule 1: Auto-propagate ConfigMap names into Knative Services
  # ---------------------------------------------------------------------
  - kind: ConfigMap
    version: v1
    fieldSpecs:
      - group: serving.knative.dev
        version: v1
        kind: Service
        path: spec/template/spec/volumes/configMap/name

  # ---------------------------------------------------------------------
  # Rule 2: Auto-propagate Service names into Knative Triggers
  # ---------------------------------------------------------------------
  - kind: Service
    group: serving.knative.dev
    version: v1
    fieldSpecs:
      - group: eventing.knative.dev
        version: v1
        kind: Trigger
        path: spec/subscriber/ref/name