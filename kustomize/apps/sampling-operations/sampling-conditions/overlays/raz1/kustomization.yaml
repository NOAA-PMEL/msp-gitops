apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: raz1-system

resources:
  - ../../base

configMapGenerator:
  - name: sampling-conditions
    envs:
      - sampling-conditions.env
  - name: sampling-conditions-conditions
    files:
      - ../../shared_configs/templates/conditions/cn_limit.json
      - ../../shared_configs/templates/conditions/wind_speed_limit.json
      - ../../shared_configs/templates/conditions/wind_direction_limit.json
      - ../../shared_configs/templates/conditions/pmel_geofence.json
      - ../../shared_configs/templates/conditions/telemetry_active.json
      - ../../shared_configs/templates/conditions/maintenance_switch.json

