apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: pmel-dev-system

resources:
  - ../../base

configMapGenerator:
  - name: sampling-conditions
    envs:
      - sampling-conditions.env
  - name: sampling-conditions-conditions
    files:
      - sampling_conditions.json

