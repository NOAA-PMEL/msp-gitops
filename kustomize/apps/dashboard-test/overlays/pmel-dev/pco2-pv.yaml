apiVersion: v1
kind: PersistentVolume
metadata:
  name: dashboard-test-efs-pv-pmel-dev
  labels:
    type: efs
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    # This is the exact same EFS volume ID used by the chunked-filemanager
    volumeHandle: fs-07e5bdd3919c7185c