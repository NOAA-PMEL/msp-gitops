apiVersion: apps/v1
kind: Deployment
metadata:
  name: filemanager
  labels:
    app: filemanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filemanager
  template:
    metadata:
      labels:
        app: filemanager
    spec:
      imagePullSecrets:
      - name: ghcr-ro-secret
      containers:
        - name: filemanager
          image: ghcr.io/noaa-pmel/msp/filemanager:0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: filemanager-config
          
          # ADD THIS BLOCK:
          resources:
            requests:
              cpu: 100m       # Guarantees 1/10th of a core to keep the MQTT loop alive
              memory: 128Mi   # Baseline memory for a Python/FastAPI app
            limits:
              cpu: 500m       # Caps burst processing at half a core
              memory: 256Mi   # Prevents memory leaks from crashing the node
          
          volumeMounts:
            - name: data-volume
              mountPath: /data
              subPath: filemanager
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: filemanager-data-pvc