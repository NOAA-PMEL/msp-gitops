apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        # Must use redis-stack-server to support your RediSearch/RedisJSON Python calls
        image: redis/redis-stack-server:latest
        imagePullPolicy: IfNotPresent
        command:
          - redis-server
          - "/etc/redis/redis-stack.conf"
        ports:
        - containerPort: 6379
          name: redis
        volumeMounts:
        - name: redis-data
          mountPath: /data
        - name: redis-config-vol
          mountPath: /etc/redis/redis-stack.conf
          subPath: redis-stack.conf
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "950Mi"
            cpu: "500m"
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-pvc
      - name: redis-config-vol
        configMap:
          name: redis-config