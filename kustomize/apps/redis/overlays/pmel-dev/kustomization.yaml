apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: redis

namespace: pmel-dev-system

resources:
  - ../../base
  - redis_db_password_sealed.yaml

patches:
  # 1. Apply auth to the deployment
  - path: deployment-patch.yaml
  
  # 2. Patch the PVC for EKS dynamic provisioning
  - target:
      kind: PersistentVolumeClaim
      name: redis-pvc
    patch: |-
      - op: remove 
        path: /spec/volumeName
      # - op: remove
      #   path: /spec/storageClassName

